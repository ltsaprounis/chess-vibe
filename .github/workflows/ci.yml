name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Ruff check
        run: uvx ruff check .

      - name: Ruff format check
        run: uvx ruff format --check .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npx eslint src/

      - name: Prettier check
        run: cd frontend && npx prettier --check src/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Type-check shared
        run: cd shared && uv sync --dev && uv run pyright

      - name: Type-check sprt-runner
        run: cd sprt-runner && uv sync --dev && uv run pyright

      - name: Type-check backend
        run: cd backend && uv sync --dev && uv run pyright

      - name: Type-check engines/random-engine
        run: cd engines/random-engine && uv sync --dev && uv run pyright

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  test:
    name: Test (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - shared
          - engines/random-engine
          - sprt-runner
          - backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: cd ${{ matrix.component }} && uv sync --dev

      - name: Run tests
        run: |
          cd ${{ matrix.component }}
          uv run pytest --cov=src --cov-report=term-missing || [ $? -eq 5 ]

  test-frontend:
    name: Test (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm run test:ci
