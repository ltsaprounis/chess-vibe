name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` for Copilot to pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python + uv ──────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      # ── Node.js ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── Python dependencies (all components) ─────────────────────
      - name: Install shared dependencies
        run: cd shared && uv sync --dev

      - name: Install sprt-runner dependencies
        run: cd sprt-runner && uv sync --dev

      - name: Install backend dependencies
        run: cd backend && uv sync --dev

      - name: Install random-engine dependencies
        run: cd engines/random-engine && uv sync --dev

      - name: Build random-engine (editable install)
        run: cd engines/random-engine && uv pip install --python .venv/bin/python -e .

      # ── Frontend dependencies ────────────────────────────────────
      - name: Install frontend dependencies
        run: cd frontend && npm ci
